<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הגלריה שלי</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">מוסדות יעקב וגיטל</div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul class="nav-links" id="nav-links">
            <li><a href="index.html">ראשי</a></li>
            <li><a href="soldiers.html">פעילות עם חיילי צה"ל</a></li>
            <li><a href="families.html">פעילות עם משפחות נזקקות</a></li>
            <li><a href="community.html">פעילות למען הקהילה</a></li>
            <li><a href="about.html">אודות העמותה</a></li>
            <li><a href="contact.html">צור קשר</a></li>
        </ul>
    </nav>

    <main class="container">
        <div class="page-header">
            <h1>עזרה לקהילה</h1>
            <p>פעילויות חסד למען הקהילה והמשפחות היקרות</p>
        </div>
    </main>

    <audio autoplay loop>
        <source src="music/muc4.mp3" type="audio/mp3">
    </audio>

    <main class="gallery">
        <div class="card">
            <div class="card-media">
                <img src="images_community/families1.jpg" alt="תמונה" class="clickable">
            </div>
            <div class="content">
                <h3>אלפי חנוכיות לקהילה</h3>
                <p>תיאור הפעילות...</p>
            </div>
        </div>
        </main>

    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img id="full-img" src="" alt="מסך מלא">
    </div>
    
    <script>
        // פונקציית תפריט
        function toggleMenu() {
            document.getElementById('nav-links').classList.toggle('active');
        }

        // סגירת תפריט בלחיצה על לינק
        document.querySelectorAll('.nav-links a').forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('nav-links').classList.remove('active');
            });
        });

        // פונקציית Lightbox מאוחדת
        const lightbox = document.getElementById('lightbox');
        const fullImg = document.getElementById('full-img');
        const closeBtn = document.querySelector('.close');

        document.querySelectorAll('.clickable').forEach(img => {
            img.addEventListener('click', () => {
                fullImg.src = img.src;
                lightbox.style.display = 'flex';
            });
        });

        closeBtn.addEventListener('click', () => { lightbox.style.display = 'none'; });
        lightbox.addEventListener('click', (e) => {
            if (e.target !== fullImg) lightbox.style.display = 'none';
        });
    </script>
</body>
</html>
